<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CA² Monogram — img2threejs</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #app { width: 100%; height: 100%; overflow: hidden; background: #050d1a; }
      body { background: #050d1a; }
      canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
      canvas:active { cursor: grabbing; }

      .hud {
        position: fixed;
        left: 1.25rem;
        bottom: 1.25rem;
        color: #f0d78c;
        font: 500 12px/1.45 "Segoe UI", system-ui, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.95;
        pointer-events: none;
        text-shadow: 0 1px 12px rgba(0,0,0,0.85);
        z-index: 2;
      }
      .hud strong {
        display: block;
        font-size: 14px;
        letter-spacing: 0.18em;
        margin-bottom: 0.35rem;
        color: #ffd978;
      }
      .hud span { opacity: 0.8; font-size: 11px; letter-spacing: 0.06em; }

      .zoom-panel {
        position: fixed;
        right: 1.15rem;
        bottom: 1.15rem;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        z-index: 3;
        align-items: stretch;
      }
      .zoom-panel button {
        width: 2.6rem;
        height: 2.6rem;
        border: 1px solid rgba(212, 175, 55, 0.45);
        border-radius: 0.55rem;
        background: rgba(8, 16, 32, 0.82);
        color: #f0d78c;
        font: 600 1.15rem/1 "Segoe UI", system-ui, sans-serif;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
        user-select: none;
      }
      .zoom-panel button:hover {
        background: rgba(30, 42, 72, 0.95);
        border-color: rgba(255, 217, 120, 0.75);
      }
      .zoom-panel button:active {
        transform: scale(0.96);
      }
      .zoom-panel button.reset {
        font-size: 0.62rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .zoom-readout {
        text-align: center;
        color: #f0d78c;
        font: 600 0.68rem/1 "Segoe UI", system-ui, sans-serif;
        letter-spacing: 0.06em;
        opacity: 0.85;
        text-shadow: 0 1px 8px rgba(0,0,0,0.7);
        min-height: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <strong>CA² · img2threejs</strong>
      <span>Drag orbit · Scroll / pinch zoom · + − buttons</span>
    </div>
    <div class="zoom-panel" aria-label="Zoom controls">
      <button type="button" id="zoom-in" title="Zoom in (+)" aria-label="Zoom in">+</button>
      <div class="zoom-readout" id="zoom-level">100%</div>
      <button type="button" id="zoom-out" title="Zoom out (−)" aria-label="Zoom out">−</button>
      <button type="button" id="zoom-reset" class="reset" title="Reset view (0)" aria-label="Reset zoom">Rst</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
