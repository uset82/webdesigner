name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Validate third-party notices
        run: pnpm validate:notices

      - name: Package VSIX
        run: pnpm package:vsix

      - name: Validate VSIX contents
        run: pnpm validate:vsix

      - name: Run packaged smoke
        run: pnpm smoke:vsix
